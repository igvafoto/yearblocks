<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="YearBlocks">
<meta name="theme-color" content="#E8E4DF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>YearBlocks · 年度进度</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#E8E4DF;
  --card:#DDD8D2;
  --card2:#D0CCC6;
  --past:#8BA888;
  --today:#D4A574;
  --future:#D0CCC6;
  --text:#4A4644;
  --text-2:#8B8680;
  --text-3:#B5B0AA;
  --accent:#8BA888;
  --border:#D0CCC6;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  overscroll-behavior:none;
  -webkit-user-select:none;
  user-select:none;
}

.app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* ===== Header ===== */
header{
  flex-shrink:0;
  padding:12px 20px 8px;
}

.year-nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:28px;
  margin-bottom:10px;
}

.nav-btn{
  width:34px;
  height:34px;
  border:none;
  background:var(--card);
  color:var(--text-2);
  border-radius:50%;
  font-size:20px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:transform .12s,background .15s;
  touch-action:manipulation;
}
.nav-btn:active{transform:scale(.88);background:var(--card2)}
.nav-btn.disabled{opacity:.25;pointer-events:none}

.year-display{
  font-size:32px;
  font-weight:800;
  letter-spacing:-1.5px;
  min-width:100px;
  text-align:center;
  transition:color .3s;
  color:var(--text);
}
.year-display.current{color:var(--accent)}

.year-sub{
  text-align:center;
  font-size:12px;
  color:var(--text-2);
  margin-top:-4px;
  margin-bottom:10px;
  min-height:17px;
}

/* Segmented Control */
.segmented{
  display:flex;
  background:var(--card);
  border-radius:9px;
  padding:2px;
  margin:0 auto;
  width:fit-content;
}
.seg-btn{
  border:none;
  background:transparent;
  color:var(--text-2);
  font-size:13px;
  font-weight:600;
  padding:6px 24px;
  border-radius:7px;
  cursor:pointer;
  transition:all .2s;
  touch-action:manipulation;
}
.seg-btn.active{background:var(--bg);color:var(--text)}

/* ===== Main ===== */
main{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:10px 16px 8px;
  -webkit-overflow-scrolling:touch;
}

/* Year view */
.year-grid{
  display:grid;
  grid-template-columns:repeat(16,1fr);
  gap:3px;
  max-width:420px;
  margin:0 auto;
}

/* Month view - 2 columns */
.months-wrapper{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:28px 20px;
  max-width:420px;
  margin:0 auto;
}

.month-section{}

.month-label{
  font-size:12px;
  font-weight:700;
  color:var(--text-2);
  margin-bottom:4px;
  padding-left:1px;
}
.month-label .month-num{color:var(--text);margin-right:3px}

.month-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:3px;
}

/* Day cell */
.day-cell{
  aspect-ratio:1;
  border-radius:3px;
  background:var(--future);
  cursor:pointer;
  transition:transform .12s;
  touch-action:manipulation;
  animation:popIn .25s ease-out both;
}
.day-cell.past{background:var(--past)}
.day-cell.today{
  background:var(--today);
  box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--today);
  transform:scale(1.15);
  z-index:1;
}
.day-cell.future{background:var(--future)}
.day-cell.empty{background:transparent;pointer-events:none}
.day-cell:active{transform:scale(1.4)}

@keyframes popIn{
  from{opacity:0;transform:scale(0)}
  to{opacity:1;transform:scale(1)}
}
.day-cell.today{animation:popIn .25s ease-out both}
/* Today subtle pulse on light bg */
@keyframes todayBreath{
  0%,100%{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--today)}
  50%{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--today),0 0 8px rgba(212,165,116,.4)}
}
.day-cell.today{animation:popIn .25s ease-out both,todayBreath 2.5s ease-in-out infinite .3s}

/* ===== Footer ===== */
footer{
  flex-shrink:0;
  padding:10px 20px 14px;
  border-top:1px solid var(--border);
}

.stats{
  display:flex;
  justify-content:space-around;
  margin-bottom:8px;
}
.stat{text-align:center}
.stat-num{
  display:block;
  font-size:22px;
  font-weight:800;
  letter-spacing:-.5px;
}
.stat-label{
  font-size:11px;
  color:var(--text-2);
  margin-top:1px;
}
.stat:nth-child(1) .stat-num{color:var(--past)}
.stat:nth-child(2) .stat-num{color:var(--text)}
.stat:nth-child(3) .stat-num{color:var(--today)}

.progress-bar{
  height:5px;
  background:var(--card);
  border-radius:3px;
  overflow:hidden;
  margin-bottom:10px;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--past),var(--today));
  border-radius:3px;
  transition:width .6s ease;
}

/* Color palette */
.color-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}
.color-label{
  font-size:11px;
  color:var(--text-2);
  margin-right:2px;
}
.color-dot{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
  transition:all .2s;
  touch-action:manipulation;
  padding:0;
}
.color-dot.active{
  border-color:var(--text);
  transform:scale(1.15);
}
.color-dot:active{transform:scale(1.3)}

.footer-actions{display:flex;gap:10px}
.action-btn{
  flex:1;
  border:none;
  background:var(--card);
  color:var(--text);
  font-size:14px;
  font-weight:600;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:transform .12s,background .15s;
  touch-action:manipulation;
}
.action-btn:active{transform:scale(.97);background:var(--card2)}

/* ===== Toast ===== */
.toast{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(74,70,68,.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  color:#FFF;
  padding:8px 18px;
  border-radius:20px;
  font-size:13px;
  font-weight:500;
  opacity:0;
  transition:all .3s;
  pointer-events:none;
  white-space:nowrap;
  z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Export overlay ===== */
.export-overlay{
  position:fixed;
  inset:0;
  background:rgba(60,56,54,.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  z-index:200;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}
.export-overlay.show{display:flex}
.export-overlay img{
  max-width:100%;
  max-height:68vh;
  border-radius:12px;
  -webkit-touch-callout:default;
  -webkit-user-select:auto;
  pointer-events:auto;
}
.export-overlay p{
  color:var(--text-2);
  font-size:14px;
  margin-top:16px;
}
.export-overlay button{
  margin-top:16px;
  border:none;
  background:var(--card);
  color:var(--text);
  font-size:16px;
  font-weight:600;
  padding:12px 48px;
  border-radius:12px;
  cursor:pointer;
}

/* ===== Loading ===== */
.loading{
  position:fixed;
  inset:0;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:300;
  transition:opacity .4s;
}
.loading.hide{opacity:0;pointer-events:none}
.loading-text{
  color:var(--accent);
  font-size:18px;
  font-weight:700;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="year-nav">
      <button class="nav-btn" id="prev-year">&#8249;</button>
      <h1 class="year-display" id="year-display">2026</h1>
      <button class="nav-btn" id="next-year">&#8250;</button>
    </div>
    <div class="year-sub" id="year-sub"></div>
    <div class="segmented">
      <button class="seg-btn active" data-view="year">全年</button>
      <button class="seg-btn" data-view="month">按月</button>
    </div>
  </header>
  <main id="grid-container"></main>
  <footer>
    <div class="stats">
      <div class="stat"><span class="stat-num" id="days-passed">0</span><span class="stat-label">已过</span></div>
      <div class="stat"><span class="stat-num" id="days-left">0</span><span class="stat-label">剩余</span></div>
      <div class="stat"><span class="stat-num" id="percent">0%</span><span class="stat-label">进度</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="color-row">
      <span class="color-label">配色</span>
      <button class="color-dot active" data-color="#8BA888" style="background:#8BA888"></button>
      <button class="color-dot" data-color="#7B9EA8" style="background:#7B9EA8"></button>
      <button class="color-dot" data-color="#9B8AA4" style="background:#9B8AA4"></button>
      <button class="color-dot" data-color="#C4956C" style="background:#C4956C"></button>
      <button class="color-dot" data-color="#C9A0A0" style="background:#C9A0A0"></button>
      <button class="color-dot" data-color="#A8A06B" style="background:#A8A06B"></button>
    </div>
    <div class="footer-actions">
      <button class="action-btn" id="export-btn">导出图片</button>
      <button class="action-btn" id="today-btn">回到今天</button>
    </div>
  </footer>
</div>
<div class="toast" id="toast"></div>
<div class="export-overlay" id="export-overlay">
  <img id="export-img" alt="YearBlocks">
  <p>长按图片保存到相册</p>
  <button id="close-export">关闭</button>
</div>
<div class="loading" id="loading"><div class="loading-text">YearBlocks</div></div>

<script>
(function(){
  'use strict';

  var today=new Date();
  var currentYear=today.getFullYear();
  var displayYear=currentYear;
  var currentView='year';
  var monthNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  var monthNums=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  // Morandi color palette
  var colorPresets={
    '#8BA888':'鼠尾草绿',
    '#7B9EA8':'灰雾蓝',
    '#9B8AA4':'藕荷紫',
    '#C4956C':'陶土棕',
    '#C9A0A0':'干枯玫瑰',
    '#A8A06B':'橄榄金'
  };
  var selectedColor='#8BA888';

  // Load saved color
  try{
    var saved=localStorage.getItem('yearblocks_color');
    if(saved && colorPresets[saved])selectedColor=saved;
  }catch(e){}

  function isLeap(y){return(y%4===0&&y%100!==0)||(y%400===0)}
  function daysInYear(y){return isLeap(y)?366:365}
  function dayOfYear(d){var s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)}

  function getCellState(year,dayIdx){
    if(year<currentYear)return'past';
    if(year>currentYear)return'future';
    var tdy=dayOfYear(today);
    if(dayIdx<tdy-1)return'past';
    if(dayIdx===tdy-1)return'today';
    return'future';
  }

  function formatDate(year,dayIdx){
    var d=new Date(year,0,dayIdx+1);
    return(d.getMonth()+1)+'月'+d.getDate()+'日';
  }

  function applyColor(color){
    selectedColor=color;
    document.documentElement.style.setProperty('--past',color);
    document.documentElement.style.setProperty('--accent',color);
    try{localStorage.setItem('yearblocks_color',color);}catch(e){}
    // Update active dot
    var dots=document.querySelectorAll('.color-dot');
    for(var i=0;i<dots.length;i++){
      if(dots[i].dataset.color===color)dots[i].classList.add('active');
      else dots[i].classList.remove('active');
    }
  }

  function renderYearView(){
    var c=document.getElementById('grid-container');
    c.innerHTML='';
    var grid=document.createElement('div');
    grid.className='year-grid';
    var total=daysInYear(displayYear);
    for(var i=0;i<total;i++){
      var cell=document.createElement('div');
      var st=getCellState(displayYear,i);
      cell.className='day-cell '+st;
      cell.style.animationDelay=(i*2.5)+'ms';
      cell.dataset.date=formatDate(displayYear,i);
      cell.dataset.day=(i+1);
      grid.appendChild(cell);
    }
    c.appendChild(grid);
    bindCells(grid);
  }

  function renderMonthView(){
    var c=document.getElementById('grid-container');
    c.innerHTML='';
    var wrapper=document.createElement('div');
    wrapper.className='months-wrapper';
    var dayOfYearOffset=0;
    for(var m=0;m<12;m++){
      var section=document.createElement('div');
      section.className='month-section';

      var label=document.createElement('div');
      label.className='month-label';
      label.innerHTML='<span class="month-num">'+monthNums[m]+'</span>'+monthNames[m];
      section.appendChild(label);

      var grid=document.createElement('div');
      grid.className='month-grid';

      var firstDay=new Date(displayYear,m,1).getDay();
      var dim=new Date(displayYear,m+1,0).getDate();

      for(var e=0;e<firstDay;e++){
        var empty=document.createElement('div');
        empty.className='day-cell empty';
        grid.appendChild(empty);
      }

      for(var d=0;d<dim;d++){
        var cell=document.createElement('div');
        var globalIdx=dayOfYearOffset+d;
        var st=getCellState(displayYear,globalIdx);
        cell.className='day-cell '+st;
        cell.style.animationDelay=(globalIdx*2.5)+'ms';
        cell.dataset.date=(m+1)+'月'+(d+1)+'日';
        cell.dataset.day=(globalIdx+1);
        grid.appendChild(cell);
      }

      dayOfYearOffset+=dim;
      section.appendChild(grid);
      wrapper.appendChild(section);
    }
    c.appendChild(wrapper);
    bindCells(c);
  }

  function bindCells(container){
    var cells=container.querySelectorAll('.day-cell:not(.empty)');
    for(var i=0;i<cells.length;i++){
      (function(cell){
        cell.addEventListener('click',function(){
          showToast(cell.dataset.date+' · 第'+cell.dataset.day+'天');
        });
      })(cells[i]);
    }
  }

  function render(){
    if(currentView==='year')renderYearView();
    else renderMonthView();
    updateStats();
    updateNav();
    updateSub();
  }

  function updateStats(){
    var total=daysInYear(displayYear);
    var passed;
    if(displayYear<currentYear)passed=total;
    else if(displayYear>currentYear)passed=0;
    else passed=dayOfYear(today);

    var left=total-passed;
    var pct=Math.round((passed/total)*100);

    document.getElementById('days-passed').textContent=passed;
    document.getElementById('days-left').textContent=left;
    document.getElementById('percent').textContent=pct+'%';
    document.getElementById('progress-fill').style.width=pct+'%';

    var yd=document.getElementById('year-display');
    yd.textContent=displayYear;
    if(displayYear===currentYear)yd.classList.add('current');
    else yd.classList.remove('current');
  }

  function updateNav(){
    var p=document.getElementById('prev-year');
    var n=document.getElementById('next-year');
    if(displayYear<=2000)p.classList.add('disabled');else p.classList.remove('disabled');
    if(displayYear>=currentYear+10)n.classList.add('disabled');else n.classList.remove('disabled');
  }

  function updateSub(){
    var sub=document.getElementById('year-sub');
    if(displayYear===currentYear){
      var m=today.getMonth()+1,d=today.getDate();
      var wk=Math.ceil(dayOfYear(today)/7);
      sub.textContent='今天是 '+m+'月'+d+'日 · 第'+wk+'周';
    }else if(displayYear<currentYear){
      sub.textContent='已过去 '+((currentYear-displayYear))+' 年';
    }else{
      sub.textContent='还有 '+(displayYear-currentYear)+' 年';
    }
  }

  function showToast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer=setTimeout(function(){t.classList.remove('show')},2000);
  }

  // ===== Export =====
  function exportImage(){
    var loading=document.getElementById('loading');
    var lt=loading.querySelector('.loading-text');
    lt.textContent='生成图片中…';
    loading.classList.remove('hide');

    setTimeout(function(){
      try{
        var scale=2;
        var cols=16;
        var gap=4;
        var cellSz=26;
        var pad=40;
        var headerH=90;
        var footerH=90;

        var total=daysInYear(displayYear);
        var rows=Math.ceil(total/cols);
        var gridW=cols*cellSz+(cols-1)*gap;
        var gridH=rows*cellSz+(rows-1)*gap;
        var W=gridW+pad*2;
        var H=headerH+gridH+footerH+pad;

        var canvas=document.createElement('canvas');
        canvas.width=W*scale;
        canvas.height=H*scale;
        var ctx=canvas.getContext('2d');
        ctx.scale(scale,scale);

        // Background - Morandi light
        ctx.fillStyle='#E8E4DF';
        ctx.fillRect(0,0,W,H);

        // Year
        ctx.fillStyle=displayYear===currentYear?selectedColor:'#4A4644';
        ctx.font='bold 40px -apple-system,Helvetica,sans-serif';
        ctx.textAlign='left';
        ctx.textBaseline='top';
        ctx.fillText(String(displayYear),pad,pad);

        // Subtitle
        var subText='';
        if(displayYear===currentYear){
          var m=today.getMonth()+1,d=today.getDate();
          subText='今天是 '+m+'月'+d+'日';
        }else if(displayYear<currentYear){
          subText='已过去 '+(currentYear-displayYear)+' 年';
        }else{
          subText='还有 '+(displayYear-currentYear)+' 年';
        }
        ctx.fillStyle='#8B8680';
        ctx.font='15px -apple-system,Helvetica,sans-serif';
        ctx.fillText(subText,pad,pad+46);

        // Grid
        var gridY=pad+headerH;
        for(var i=0;i<total;i++){
          var r=Math.floor(i/cols);
          var col=i%cols;
          var x=pad+col*(cellSz+gap);
          var y=gridY+r*(cellSz+gap);
          var st=getCellState(displayYear,i);

          ctx.save();
          if(st==='today'){
            ctx.fillStyle='#D4A574';
          }else if(st==='past'){
            ctx.fillStyle=selectedColor;
          }else{
            ctx.fillStyle='#D0CCC6';
          }
          ctx.beginPath();
          if(ctx.roundRect){
            ctx.roundRect(x,y,cellSz,cellSz,3);
          }else{
            ctx.rect(x,y,cellSz,cellSz);
          }
          ctx.fill();

          // Today ring
          if(st==='today'){
            ctx.strokeStyle='#D4A574';
            ctx.lineWidth=2;
            ctx.beginPath();
            if(ctx.roundRect){
              ctx.roundRect(x-3,y-3,cellSz+6,cellSz+6,5);
            }else{
              ctx.rect(x-3,y-3,cellSz+6,cellSz+6);
            }
            ctx.stroke();
          }
          ctx.restore();
        }

        // Footer stats
        var passed;
        if(displayYear<currentYear)passed=total;
        else if(displayYear>currentYear)passed=0;
        else passed=dayOfYear(today);
        var left=total-passed;
        var pct=Math.round((passed/total)*100);
        var fy=gridY+gridH+24;

        var colW=gridW/3;
        ctx.textAlign='center';
        ctx.font='bold 22px -apple-system,Helvetica,sans-serif';
        ctx.fillStyle=selectedColor;
        ctx.fillText(passed+'天',pad+colW*0.5,fy);
        ctx.fillStyle='#4A4644';
        ctx.fillText(left+'天',pad+colW*1.5,fy);
        ctx.fillStyle='#D4A574';
        ctx.fillText(pct+'%',pad+colW*2.5,fy);

        ctx.fillStyle='#8B8680';
        ctx.font='12px -apple-system,Helvetica,sans-serif';
        ctx.fillText('已过',pad+colW*0.5,fy+28);
        ctx.fillText('剩余',pad+colW*1.5,fy+28);
        ctx.fillText('进度',pad+colW*2.5,fy+28);

        // Watermark
        ctx.fillStyle='#B5B0AA';
        ctx.font='11px -apple-system,Helvetica,sans-serif';
        ctx.textAlign='right';
        ctx.fillText('YearBlocks',W-pad,H-16);

        var dataUrl=canvas.toDataURL('image/png');
        document.getElementById('export-img').src=dataUrl;
        document.getElementById('export-overlay').classList.add('show');
      }catch(e){
        showToast('导出失败');
      }
      loading.classList.add('hide');
      lt.textContent='YearBlocks';
    },100);
  }

  // ===== Swipe gesture =====
  var touchSX=0,touchSY=0;
  var mainEl=document.getElementById('grid-container');
  mainEl.addEventListener('touchstart',function(e){
    touchSX=e.changedTouches[0].screenX;
    touchSY=e.changedTouches[0].screenY;
  },{passive:true});
  mainEl.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].screenX-touchSX;
    var dy=e.changedTouches[0].screenY-touchSY;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8){
      if(dx>0){displayYear--;render();}
      else{displayYear++;render();}
    }
  },{passive:true});

  // ===== Events =====
  document.getElementById('prev-year').addEventListener('click',function(){displayYear--;render();});
  document.getElementById('next-year').addEventListener('click',function(){displayYear++;render();});
  document.getElementById('today-btn').addEventListener('click',function(){
    displayYear=currentYear;render();showToast('已回到 '+currentYear);
  });

  var segBtns=document.querySelectorAll('.seg-btn');
  for(var i=0;i<segBtns.length;i++){
    segBtns[i].addEventListener('click',function(){
      for(var j=0;j<segBtns.length;j++)segBtns[j].classList.remove('active');
      this.classList.add('active');
      currentView=this.dataset.view;
      render();
    });
  }

  // Color palette events
  var colorDots=document.querySelectorAll('.color-dot');
  for(var i=0;i<colorDots.length;i++){
    colorDots[i].addEventListener('click',function(){
      applyColor(this.dataset.color);
      showToast(colorPresets[this.dataset.color]||'自定义');
    });
  }

  document.getElementById('export-btn').addEventListener('click',exportImage);
  document.getElementById('close-export').addEventListener('click',function(){
    document.getElementById('export-overlay').classList.remove('show');
  });

  // ===== Init =====
  applyColor(selectedColor);
  render();
  setTimeout(function(){
    document.getElementById('loading').classList.add('hide');
  },500);

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
})();
</script>
</body>
</html>
